name: PullPreview

on:
  schedule:
    - cron: "30 */6 * * *"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write

jobs:
  prepare:
    if: github.event_name == 'schedule' || github.event.label.name == 'pullpreview' || contains(github.event.pull_request.labels.*.name, 'pullpreview')
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      auth_label_changed: ${{ steps.auth_label_change.outputs.changed }}
      force_action: ${{ steps.auth_label_change.outputs.force_action }}
    steps:
      - id: auth_label_change
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          action="$(jq -r '.action // ""' "$GITHUB_EVENT_PATH")"
          label="$(jq -r '.label.name // ""' "$GITHUB_EVENT_PATH")"
          has_pullpreview="$(jq -r '[.pull_request.labels[]?.name] | index("pullpreview") != null' "$GITHUB_EVENT_PATH")"

          auth_label_changed=false
          if [[ "$has_pullpreview" == "true" && ( "$action" == "labeled" || "$action" == "unlabeled" ) ]]; then
            case "$label" in
              auth-sso-external|auth-sso-nextcloud|auth-oauth2)
                auth_label_changed=true
                ;;
            esac
          fi

          {
            echo "changed=${auth_label_changed}"
            if [[ "$auth_label_changed" == "true" ]]; then
              echo "force_action=up"
            else
              echo "force_action="
            fi
          } >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'schedule' || github.event.label.name == 'pullpreview' || contains(github.event.pull_request.labels.*.name, 'pullpreview')
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Recreate preview before auth-mode change
        if: needs.prepare.outputs.auth_label_changed == 'true'
        # Temporary branch ref until proxy_tls_hosts is merged upstream.
        uses: pullpreview/action@poc/pullpreview-helm-multihost
        with:
          provider: hetzner
          label: pullpreview
          force_action: down
          deployment_target: helm
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}

      - id: pullpreview
        # Temporary branch ref until proxy_tls_hosts is merged upstream.
        uses: pullpreview/action@poc/pullpreview-helm-multihost
        with:
          provider: hetzner
          label: pullpreview
          force_action: ${{ needs.prepare.outputs.force_action }}
          region: fsn1
          image: ubuntu-24.04
          instance_type: cpx42
          dns: my.preview.run
          max_domain_length: "40"
          deployment_target: helm
          chart: ./charts/pullpreview-stack
          chart_values: pullpreview/pullpreview-stack-values.yaml
          proxy_tls: traefik:80
          proxy_tls_hosts: nextcloud.{{ pullpreview_public_dns }},keycloak.{{ pullpreview_public_dns }}
          ttl: 72h
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}

      - name: Add secondary URLs to job summary
        if: steps.pullpreview.outputs.live == 'true'
        shell: bash
        run: |
          set -euo pipefail
          preview_url="${{ steps.pullpreview.outputs.url }}"
          preview_host="${preview_url#https://}"
          preview_host="${preview_host#http://}"
          preview_host="${preview_host%%/*}"
          preview_host="${preview_host%%:*}"

          {
            echo ""
            echo "### Preview endpoints"
            echo ""
            echo "- Main FQDN: https://${preview_host}"
            echo "- Nextcloud: https://nextcloud.${preview_host}"
            echo "- Keycloak: https://keycloak.${preview_host}/realms/opnc"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate preview URLs
        if: steps.pullpreview.outputs.live == 'true'
        shell: bash
        run: |
          set -euo pipefail
          preview_url="${{ steps.pullpreview.outputs.url }}"
          preview_host="${preview_url#https://}"
          preview_host="${preview_host#http://}"
          preview_host="${preview_host%%/*}"
          preview_host="${preview_host%%:*}"

          curl_status() {
            local url="$1"
            /usr/bin/curl -skS -o /dev/null \
              --connect-timeout 10 \
              --retry 6 \
              --retry-delay 10 \
              --write-out '%{http_code}' \
              "$url"
          }

          root_status="$(curl_status "https://${preview_host}/")"
          login_status="$(curl_status "https://${preview_host}/login")"
          nextcloud_status="$(curl_status "https://nextcloud.${preview_host}/status.php")"
          keycloak_status="$(curl_status "https://keycloak.${preview_host}/realms/opnc")"

          test "${root_status}" = "302"
          test "${login_status}" = "200"
          test "${nextcloud_status}" = "200"
          test "${keycloak_status}" = "200"
