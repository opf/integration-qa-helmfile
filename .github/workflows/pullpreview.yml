name: PullPreview

on:
  schedule:
    - cron: "30 */6 * * *"
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event_name == 'schedule' || github.event.label.name == 'pullpreview' || contains(github.event.pull_request.labels.*.name, 'pullpreview')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - id: auth_label_change
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          action="$(jq -r '.action // ""' "$GITHUB_EVENT_PATH")"
          label="$(jq -r '.label.name // ""' "$GITHUB_EVENT_PATH")"
          has_pullpreview="$(jq -r '[.pull_request.labels[]?.name] | index("pullpreview") != null' "$GITHUB_EVENT_PATH")"

          auth_label_changed=false
          if [[ "$has_pullpreview" == "true" && ( "$action" == "labeled" || "$action" == "unlabeled" ) ]]; then
            case "$label" in
              auth-sso-external|auth-sso-nextcloud|auth-oauth2)
                auth_label_changed=true
                ;;
            esac
          fi

          {
            echo "changed=${auth_label_changed}"
            if [[ "$auth_label_changed" == "true" ]]; then
              echo "force_action=up"
            else
              echo "force_action="
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Recreate preview before auth-mode change
        if: steps.auth_label_change.outputs.changed == 'true'
        uses: pullpreview/action@65df5209b58f360444525f1167f9e14803521fed
        with:
          provider: hetzner
          label: pullpreview
          force_action: down
          deployment_target: helm
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}
          PULLPREVIEW_LOGGER_LEVEL: ERROR

      - id: pullpreview
        uses: pullpreview/action@65df5209b58f360444525f1167f9e14803521fed
        with:
          provider: hetzner
          label: pullpreview
          force_action: ${{ steps.auth_label_change.outputs.force_action }}
          region: fsn1
          image: ubuntu-24.04
          instance_type: cpx42
          dns: my.opf.run
          max_domain_length: "40"
          deployment_target: helm
          chart: ./charts/pullpreview-stack
          chart_values: pullpreview/stack-values.yaml.gotmpl
          pre_script: pullpreview/pre-script-helm-deps.sh
          proxy_tls: traefik:80
          proxy_tls_hosts: nextcloud.{{ pullpreview_public_dns }},keycloak.{{ pullpreview_public_dns }},xwiki.{{ pullpreview_public_dns }}
          ttl: 72h
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}
          OPENPROJECT_ENTERPRISE_TOKEN: ${{ secrets.OPENPROJECT_ENTERPRISE_TOKEN }}
          PULLPREVIEW_LOGGER_LEVEL: ERROR

      - name: Strip SSH lines from PullPreview summary
        if: always() && steps.pullpreview.outcome != 'skipped'
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${GITHUB_STEP_SUMMARY:-}" ]] || exit 0
          [[ -f "${GITHUB_STEP_SUMMARY}" ]] || exit 0
          sed -i -E '/^- SSH (Username|IP|Command):/d' "${GITHUB_STEP_SUMMARY}"

      - name: Deploy preview summary
        if: always() && steps.pullpreview.outcome != 'skipped'
        env:
          PREVIEW_NAME: pullpreview
          PULLPREVIEW_OUTCOME: ${{ steps.pullpreview.outcome }}
          PULLPREVIEW_LIVE: ${{ steps.pullpreview.outputs.live }}
          PREVIEW_URL: ${{ steps.pullpreview.outputs.url }}
        run: .github/scripts/deploy-preview-summary.sh

      - name: Resolve preview host for checks
        id: preview_host
        if: steps.pullpreview.outputs.live == 'true'
        env:
          PREVIEW_URL: ${{ steps.pullpreview.outputs.url }}
        run: |
          set -euo pipefail
          host="$(.github/scripts/preview-parse-host.sh)"
          echo "host=${host}" >> "$GITHUB_OUTPUT"
          {
            echo "### Endpoint checks"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Check OpenProject
        id: check_openproject
        if: steps.pullpreview.outputs.live == 'true'
        continue-on-error: true
        env:
          PREVIEW_HOST: ${{ steps.preview_host.outputs.host }}
        run: |
          set -euo pipefail
          failed=false
          set +e
          .github/scripts/preview-check-url.sh "OpenProject (root)" "https://${PREVIEW_HOST}/" "302" || failed=true
          .github/scripts/preview-check-url.sh "OpenProject (login)" "https://${PREVIEW_HOST}/login" "200" || failed=true
          set -e
          [[ "${failed}" != "true" ]]

      - name: Check Nextcloud
        id: check_nextcloud
        if: steps.pullpreview.outputs.live == 'true'
        continue-on-error: true
        env:
          PREVIEW_HOST: ${{ steps.preview_host.outputs.host }}
        run: |
          set -euo pipefail
          .github/scripts/preview-check-url.sh "Nextcloud" "https://nextcloud.${PREVIEW_HOST}/status.php" "200" 60 10

      - name: Check Keycloak
        id: check_keycloak
        if: steps.pullpreview.outputs.live == 'true'
        continue-on-error: true
        env:
          PREVIEW_HOST: ${{ steps.preview_host.outputs.host }}
        run: |
          set -euo pipefail
          .github/scripts/preview-check-url.sh "Keycloak" "https://keycloak.${PREVIEW_HOST}/realms/opnc" "200"

      - name: Check XWiki
        id: check_xwiki
        if: steps.pullpreview.outputs.live == 'true'
        continue-on-error: true
        env:
          PREVIEW_HOST: ${{ steps.preview_host.outputs.host }}
        run: |
          set -euo pipefail
          .github/scripts/preview-check-url.sh "XWiki" "https://xwiki.${PREVIEW_HOST}/bin/distribution/XWiki/Distribution" "200" 120 10 true

      - name: Require all endpoint checks
        if: always() && steps.pullpreview.outputs.live == 'true'
        env:
          CHECK_OP: ${{ steps.check_openproject.outcome }}
          CHECK_NC: ${{ steps.check_nextcloud.outcome }}
          CHECK_KC: ${{ steps.check_keycloak.outcome }}
          CHECK_XW: ${{ steps.check_xwiki.outcome }}
        run: |
          set -euo pipefail
          failed=false
          for entry in "OpenProject:${CHECK_OP}" "Nextcloud:${CHECK_NC}" "Keycloak:${CHECK_KC}" "XWiki:${CHECK_XW}"; do
            name="${entry%%:*}"
            outcome="${entry#*:}"
            if [[ "${outcome}" == "failure" || "${outcome}" == "skipped" ]]; then
              echo "::error::${name} endpoint check failed"
              failed=true
            fi
          done
          [[ "${failed}" != "true" ]]
