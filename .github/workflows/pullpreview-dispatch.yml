name: PullPreview Dispatch
run-name: PullPreview Dispatch (${{ inputs.action }}) - ${{ inputs.preview_name }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: "PullPreview action"
        required: true
        default: up
        type: choice
        options:
          - up
          - down
      preview_name:
        description: "Deterministic preview identifier (used as PullPreview label)"
        required: true
        type: string
      integrationSetupMethod:
        description: "Integration setup mode"
        required: true
        default: sso-external
        type: choice
        options:
          - sso-external
          - sso-nextcloud
          - oauth2
      openproject_version:
        description: "Optional OpenProject docker tag override"
        required: false
        type: string
      nextcloud_version:
        description: "Optional Nextcloud image tag override"
        required: false
        type: string
      keycloak_version:
        description: "Optional Keycloak image tag override"
        required: false
        type: string
      integration_app_version:
        description: "Optional integration_openproject app version (alias if integration_openproject_version is empty)"
        required: false
        type: string
      integration_openproject_version:
        description: "integration_openproject app version (overrides integration_app_version when set)"
        required: false
        type: string
      integration_openproject_git_branch:
        description: "integration_openproject git branch (ignored if empty; version ignored when set)"
        required: false
        type: string
      openproject_branch:
        description: "Optional OpenProject git source branch override"
        required: false
        type: string
      nextcloud_branch:
        description: "Optional Nextcloud git source branch override"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy_or_teardown:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Log ref and inputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Integration repo ref: ${GITHUB_REF_NAME:-} sha: ${GITHUB_SHA:-}"
          echo "Action: ${{ inputs.action }}"
          echo "Preview name: ${{ inputs.preview_name }}"
          echo "Setup method: ${{ inputs.integrationSetupMethod }}"
          echo "Requested versions: OP='${{ inputs.openproject_version }}' NC='${{ inputs.nextcloud_version }}' KC='${{ inputs.keycloak_version }}'"
          echo "Requested integration app: legacy='${{ inputs.integration_app_version }}' io_ver='${{ inputs.integration_openproject_version }}' io_git='${{ inputs.integration_openproject_git_branch }}'"
          echo "Requested branches: OP='${{ inputs.openproject_branch }}' NC='${{ inputs.nextcloud_branch }}'"
          test -f ".github/workflows/pullpreview-dispatch.yml"
          echo "Workflow file present: .github/workflows/pullpreview-dispatch.yml"

      - name: Create dispatch override values
        if: inputs.action == 'up'
        shell: bash
        env:
          OPENPROJECT_ENTERPRISE_TOKEN: ${{ secrets.OPENPROJECT_ENTERPRISE_TOKEN }}
        run: |
          set -euo pipefail
          out="pullpreview/pullpreview-stack-values.dispatch.yaml.gotmpl"
          mkdir -p pullpreview

          # integration_openproject: prefer explicit inputs; fall back to integration_app_version for version
          IO_VER="${{ inputs.integration_openproject_version }}"
          IO_GIT="${{ inputs.integration_openproject_git_branch }}"
          LEGACY_VER="${{ inputs.integration_app_version }}"
          if [ -n "${IO_VER}" ]; then
            APP_VER="${IO_VER}"
          else
            APP_VER="${LEGACY_VER}"
          fi

          {
            echo "opnc-integration:"
            echo "  openprojectHost: \"{{ pullpreview_public_dns }}\""
            echo "  openprojectAssetHost: \"openproject-assets.{{ pullpreview_public_dns }}\""
            echo "  nextcloudHost: \"nextcloud.{{ pullpreview_public_dns }}\""
            echo "  keycloakHost: \"keycloak.{{ pullpreview_public_dns }}\""
            echo "  integrationSetupMethod: \"${{ inputs.integrationSetupMethod }}\""

            if [ -n "${{ inputs.openproject_version }}" ] || [ -n "${{ inputs.openproject_branch }}" ]; then
              echo "  openproject:"
              echo "    dockerTag: \"${{ inputs.openproject_version }}\""
              echo "    gitSourceBranch: \"${{ inputs.openproject_branch }}\""
            fi

            if [ -n "${{ inputs.nextcloud_branch }}" ] || [ -n "${APP_VER}" ] || [ -n "${IO_GIT}" ]; then
              echo "  nextcloud:"
              echo "    gitSourceBranch: \"${{ inputs.nextcloud_branch }}\""
              echo "    enableApps:"
              echo "      - name: integration_openproject"
              echo "        version: \"${APP_VER}\""
              echo "        gitBranch: \"${IO_GIT}\""
            fi

            printf '%s\n' \
              'openproject:' \
              '  openproject:' \
              '    host: "{{ pullpreview_public_dns }}"' \
              '    oidc:' \
              '      host: "keycloak.{{ pullpreview_public_dns }}"' \
              '  environment:' \
              '    OPENPROJECT_DEV_EXTRA_HOSTS: "{{ pullpreview_public_dns }}"' \
              '    OPENPROJECT_OPENID__CONNECT_KEYCLOAK_ISSUER: "https://keycloak.{{ pullpreview_public_dns }}/realms/opnc"' \
              '    OPENPROJECT_OPENID__CONNECT_KEYCLOAK_JWKS__URI: "https://keycloak.{{ pullpreview_public_dns }}/realms/opnc/protocol/openid-connect/certs"' \
              '    OPENPROJECT_OPENID__CONNECT_KEYCLOAK_POST__LOGOUT__REDIRECT__URI: "https://{{ pullpreview_public_dns }}/"'

            if [ -n "${OPENPROJECT_ENTERPRISE_TOKEN:-}" ]; then
              echo '    OPENPROJECT_SEED__ENTERPRISE__TOKEN: |'
              printf '%s\n' "${OPENPROJECT_ENTERPRISE_TOKEN}" | sed 's/^/      /'
            fi

            printf '%s\n' \
              '' \
              'nextcloud:' \
              '  nextcloud:' \
              '    host: "nextcloud.{{ pullpreview_public_dns }}"' \
              '    extraEnv:' \
              '      - name: NC_GIT_SOURCE_BRANCH' \
              '        value: ""' \
              '      - name: OVERWRITEPROTOCOL' \
              '        value: https' \
              '      - name: OVERWRITECLIURL' \
              '        value: "https://nextcloud.{{ pullpreview_public_dns }}"' \
              '      - name: OIDC_KEYCLOAK_NEXTCLOUD_CLIENT_ID' \
              '        value: nextcloud' \
              '      - name: OIDC_KEYCLOAK_NEXTCLOUD_CLIENT_SECRET' \
              '        value: nextcloud-secret' \
              '      - name: OIDC_KEYCLOAK_PROVIDER_NAME' \
              '        value: keycloak' \
              '      - name: OIDC_KEYCLOAK_DISCOVERY_URL' \
              '        value: "https://keycloak.{{ pullpreview_public_dns }}/realms/opnc/.well-known/openid-configuration"' \
              '      - name: NEXTCLOUD_ENABLE_APPS' \
              '        valueFrom:' \
              '          configMapKeyRef:' \
              '            name: nextcloud-enable-apps' \
              '            key: enable-apps' \
              '' \
              'keycloak:' \
              '  extraEnvVars:' \
              '    - name: KEYCLOAK_HOSTNAME' \
              '      value: "keycloak.{{ pullpreview_public_dns }}"' \
              '    - name: KC_REALM_NAME' \
              '      value: "opnc"' \
              '    - name: KC_NEXTCLOUD_CLIENT_ID' \
              '      value: "nextcloud"' \
              '    - name: KC_NEXTCLOUD_CLIENT_SECRET' \
              '      value: "nextcloud-secret"' \
              '    - name: KC_NEXTCLOUD_CLIENT_HOST' \
              '      value: "nextcloud.{{ pullpreview_public_dns }}"' \
              '    - name: KC_OPENPROJECT_CLIENT_ID' \
              '      value: "openproject"' \
              '    - name: KC_OPENPROJECT_CLIENT_SECRET' \
              '      value: "openproject-secret"' \
              '    - name: KC_OPENPROJECT_CLIENT_HOST' \
              '      value: "{{ pullpreview_public_dns }}"'
          } > "${out}"

          # Image tags only at top level (Helm merges with block above)
          if [ -n "${{ inputs.openproject_version }}" ]; then
            printf '%s\n' \
              'openproject:' \
              '  image:' \
              "    tag: \"${{ inputs.openproject_version }}\"" >> "${out}"
          fi

          if [ -n "${{ inputs.nextcloud_version }}" ]; then
            printf '%s\n' \
              'nextcloud:' \
              '  image:' \
              "    tag: \"${{ inputs.nextcloud_version }}\"" >> "${out}"
          fi

          if [ -n "${{ inputs.keycloak_version }}" ]; then
            printf '%s\n' \
              'keycloak:' \
              '  image:' \
              "    tag: \"${{ inputs.keycloak_version }}\"" >> "${out}"
          fi

          test -f "${out}" || { echo "::error::missing ${out}"; exit 1; }
          echo "Dispatch values file present: ${out}"

      - name: Log enterprise token presence
        if: inputs.action == 'up'
        shell: bash
        env:
          OPENPROJECT_ENTERPRISE_TOKEN: ${{ secrets.OPENPROJECT_ENTERPRISE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${OPENPROJECT_ENTERPRISE_TOKEN:-}" ]; then
            echo "Enterprise token present: false"
            exit 0
          fi
          token_len="$(printf '%s' "${OPENPROJECT_ENTERPRISE_TOKEN}" | wc -c | tr -d ' ')"
          token_sha256="$(printf '%s' "${OPENPROJECT_ENTERPRISE_TOKEN}" | shasum -a 256 | awk '{print $1}')"
          echo "Enterprise token present: true"
          echo "Enterprise token length: ${token_len}"
          echo "Enterprise token sha256: ${token_sha256}"

      - id: pullpreview_up
        if: inputs.action == 'up'
        # Temporary branch ref until proxy_tls_hosts is merged upstream.
        uses: pullpreview/action@poc/pullpreview-helm-multihost
        with:
          provider: hetzner
          label: ${{ inputs.preview_name }}
          force_action: up
          region: fsn1
          image: ubuntu-24.04
          instance_type: cpx42
          dns: my.preview.run
          max_domain_length: "40"
          deployment_target: helm
          chart: ./charts/pullpreview-stack
          chart_values: pullpreview/pullpreview-stack-values.dispatch.yaml.gotmpl
          proxy_tls: traefik:80
          proxy_tls_hosts: nextcloud.{{ pullpreview_public_dns }},keycloak.{{ pullpreview_public_dns }}
          ttl: 72h
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}

      - name: Validate preview URLs
        if: inputs.action == 'up' && steps.pullpreview_up.outputs.live == 'true'
        shell: bash
        run: |
          set -euo pipefail
          preview_url="${{ steps.pullpreview_up.outputs.url }}"
          preview_host="${preview_url#https://}"
          preview_host="${preview_host#http://}"
          preview_host="${preview_host%%/*}"
          preview_host="${preview_host%%:*}"

          check_url() {
            local name="$1"
            local url="$2"
            local expected_status="$3"
            local attempt
            local attempts=12
            local status=""
            local curl_exit=0

            for attempt in $(seq 1 "${attempts}"); do
              set +e
              status="$(
                /usr/bin/curl -skS -o /dev/null \
                  --connect-timeout 10 \
                  --write-out '%{http_code}' \
                  "$url" 2>/dev/null
              )"
              curl_exit=$?
              set -e

              if [[ "${curl_exit}" -eq 0 ]]; then
                echo "${name}: ${url} -> ${status} (attempt ${attempt}/${attempts})"
                if [[ "${status}" == "${expected_status}" ]]; then
                  return 0
                fi
              else
                echo "${name}: ${url} -> curl-exit-${curl_exit} (attempt ${attempt}/${attempts})"
              fi

              sleep 10
            done

            echo "::group::Debug: response headers for ${name}"
            /usr/bin/curl -skS -D- -o /dev/null "$url" 2>&1 | head -n 50 || true
            echo "::endgroup::"
            echo "::error::${name} endpoint was not ready: ${url} expected HTTP ${expected_status}, last result ${status}"
            return 1
          }

          check_url "Main root" "https://${preview_host}/" "302"
          check_url "Main login" "https://${preview_host}/login" "200"
          check_url "Nextcloud" "https://nextcloud.${preview_host}/status.php" "200"
          check_url "Keycloak" "https://keycloak.${preview_host}/realms/opnc" "200"

      - name: Build preview info artifact
        if: inputs.action == 'up'
        shell: bash
        run: |
          set -euo pipefail
          preview_url="${{ steps.pullpreview_up.outputs.url }}"
          preview_host="${preview_url#https://}"
          preview_host="${preview_host#http://}"
          preview_host="${preview_host%%/*}"
          preview_host="${preview_host%%:*}"

          cat > preview-info.json <<EOF
          {
            "preview_name": "${{ inputs.preview_name }}",
            "preview_url": "${preview_url}",
            "preview_host": "${preview_host}",
            "nextcloud_url": "https://nextcloud.${preview_host}",
            "keycloak_url": "https://keycloak.${preview_host}/realms/opnc",
            "live": "${{ steps.pullpreview_up.outputs.live }}"
          }
          EOF

      - name: Upload preview info artifact
        if: inputs.action == 'up'
        uses: actions/upload-artifact@v4
        with:
          name: pullpreview-info
          path: preview-info.json

      - id: pullpreview_down
        if: inputs.action == 'down'
        # Temporary branch ref until proxy_tls_hosts is merged upstream.
        uses: pullpreview/action@poc/pullpreview-helm-multihost
        with:
          provider: hetzner
          label: ${{ inputs.preview_name }}
          force_action: down
          deployment_target: helm
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}
