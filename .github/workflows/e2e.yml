name: E2E Manual Run
run-name: "e2e - ${{ github.event.inputs.suite }} - ${{ github.event.inputs.setupMethod }} - op ${{ github.event.inputs.openproject_version || '17.0' }} - nc ${{ github.event.inputs.nextcloud_version || '32' }}"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "PullPreview action"
        required: true
        default: up
        type: choice
        options:
          - up
          - down
      preview_name:
        description: "When action=down (pull preview label)"
        required: false
        type: string
      suite:
        description: "Test suite"
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - regression
          - integration
          - custom
      custom_grep:
        description: "Custom --grep expression"
        required: false
        type: string
      setupMethod:
        description: "Integration setup mode"
        required: true
        default: sso-external
        type: choice
        options:
          - sso-external
          - sso-nextcloud
          - oauth2
      keep_environment_on_failure:
        description: "Keep PullPreview environment when tests fail"
        required: true
        default: false
        type: boolean
      openproject_version:
        description: "OpenProject image tag (empty = 17.0)"
        required: false
        type: string
      openproject_branch:
        description: "Optional OpenProject git source branch override"
        required: false
        type: string
      nextcloud_version:
        description: "Nextcloud image tag (empty = 32)"
        required: false
        type: string
      nextcloud_branch:
        description: "Optional Nextcloud git source branch override"
        required: false
        type: string
      keycloak_version:
        description: "Keycloak image tag (empty = 26.2.5)"
        required: false
        type: string
      integration_openproject_version:
        description: "integration_openproject app version"
        required: false
        type: string
      integration_openproject_branch:
        description: "integration_openproject git branch override"
        required: false
        type: string

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 140
    env:
      CI: true
      HEADLESS: true
      SKIP_SETUP_JOB_CHECK: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record run start time (Europe/Berlin)
        shell: bash
        run: |
          set -euo pipefail
          ts="$(TZ=Europe/Berlin date '+%d %b %Y %H:%M:%S')"
          {
            echo "### E2E manual run"
            echo ""
            echo "**Started (Europe/Berlin):** ${ts}"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "::notice::E2E started (Europe/Berlin): ${ts}"

      - name: Resolve grep and preview name
        id: resolve
        shell: bash
        env:
          IN_ACTION: ${{ github.event.inputs.action }}
          IN_SUITE: ${{ github.event.inputs.suite }}
          IN_CUSTOM_GREP: ${{ github.event.inputs.custom_grep }}
          IN_PREVIEW_NAME: ${{ github.event.inputs.preview_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          grep=""
          case "${IN_SUITE}" in
            all) grep='' ;;
            smoke) grep='@smoke' ;;
            regression) grep='@regression' ;;
            integration) grep='@integration' ;;
            custom) grep="${IN_CUSTOM_GREP}" ;;
            *)
              echo "::error::Unknown suite: ${IN_SUITE}"
              exit 1
              ;;
          esac

          if [ "${IN_SUITE}" = "custom" ] && [ -z "${grep}" ]; then
            echo "::error::Resolved grep is empty. For suite=custom, set custom_grep."
            exit 1
          fi

          preview_name=""
          if [[ "${IN_ACTION}" == "down" ]]; then
            preview_name="${IN_PREVIEW_NAME}"
            if [[ -z "${preview_name}" ]]; then
              echo "::error::For action=down, you must provide preview_name."
              exit 1
            fi
          else
            preview_name="e2e-${RUN_ID}-${RUN_ATTEMPT}"
          fi

          # Heredoc-delimited outputs guard against newlines/special chars in
          # user-provided inputs (e.g. custom_grep or preview_name).
          delim="EOF_$(openssl rand -hex 8)"
          {
            printf 'grep<<%s\n%s\n%s\n' "${delim}" "${grep}" "${delim}"
            printf 'preview_name<<%s\n%s\n%s\n' "${delim}" "${preview_name}" "${delim}"
          } >> "$GITHUB_OUTPUT"

      - name: Teardown PullPreview (action=down)
        if: github.event.inputs.action == 'down'
        uses: pullpreview/action@65df5209b58f360444525f1167f9e14803521fed
        with:
          provider: hetzner
          label: ${{ steps.resolve.outputs.preview_name }}
          force_action: down
          deployment_target: helm
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}

      - name: PullPreview up
        id: pullpreview_up
        if: github.event.inputs.action == 'up'
        uses: pullpreview/action@65df5209b58f360444525f1167f9e14803521fed
        with:
          provider: hetzner
          label: ${{ steps.resolve.outputs.preview_name }}
          force_action: up
          region: fsn1
          image: ubuntu-24.04
          instance_type: cpx42
          dns: my.preview.run
          max_domain_length: "40"
          deployment_target: helm
          chart: ./charts/pullpreview-stack
          chart_values: pullpreview/stack-values.yaml.gotmpl
          proxy_tls: traefik:80
          proxy_tls_hosts: nextcloud.{{ pullpreview_public_dns }},keycloak.{{ pullpreview_public_dns }}
          ttl: 72h
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}
          OPENPROJECT_ENTERPRISE_TOKEN: ${{ secrets.OPENPROJECT_ENTERPRISE_TOKEN }}
          INTEGRATION_SETUP_METHOD: ${{ github.event.inputs.setupMethod }}
          OPENPROJECT_VERSION: ${{ github.event.inputs.openproject_version }}
          OPENPROJECT_BRANCH: ${{ github.event.inputs.openproject_branch }}
          NEXTCLOUD_VERSION: ${{ github.event.inputs.nextcloud_version }}
          NEXTCLOUD_BRANCH: ${{ github.event.inputs.nextcloud_branch }}
          KEYCLOAK_VERSION: ${{ github.event.inputs.keycloak_version }}
          INTEGRATION_OPENPROJECT_VERSION: ${{ github.event.inputs.integration_openproject_version }}
          INTEGRATION_OPENPROJECT_GIT_BRANCH: ${{ github.event.inputs.integration_openproject_branch }}

      - name: Validate preview URLs
        if: steps.pullpreview_up.outputs.live == 'true'
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.pullpreview_up.outputs.url }}
        run: |
          set -euo pipefail
          preview_url="${PREVIEW_URL}"
          preview_host="${preview_url#https://}"
          preview_host="${preview_host#http://}"
          preview_host="${preview_host%%/*}"
          preview_host="${preview_host%%:*}"

          check_url() {
            local name="$1"
            local url="$2"
            local expected_status="$3"
            local attempts="${4:-12}"
            local sleep_seconds="${5:-10}"
            local attempt
            local status=""
            local curl_exit=0

            for attempt in $(seq 1 "${attempts}"); do
              set +e
              status="$(
                /usr/bin/curl -skS -o /dev/null \
                  --connect-timeout 10 \
                  --write-out '%{http_code}' \
                  "$url" 2>/dev/null
              )"
              curl_exit=$?
              set -e

              if [[ "${curl_exit}" -eq 0 ]]; then
                if [[ "${attempt}" -eq 1 ]]; then
                  echo "${name}: ${url} -> ${status} (attempt ${attempt}/${attempts})"
                else
                  echo "${name}: ${status} (attempt ${attempt}/${attempts})"
                fi
                if [[ "${status}" == "${expected_status}" ]]; then
                  return 0
                fi
              else
                if [[ "${attempt}" -eq 1 ]]; then
                  echo "${name}: ${url} -> curl-exit-${curl_exit} (attempt ${attempt}/${attempts})"
                else
                  echo "${name}: curl-exit-${curl_exit} (attempt ${attempt}/${attempts})"
                fi
              fi

              sleep "${sleep_seconds}"
            done

            echo "::group::Debug: response headers for ${name}"
            /usr/bin/curl -skS -D- -o /dev/null "$url" 2>&1 | head -n 50 || true
            echo "::endgroup::"
            echo "::error::${name} endpoint was not ready: ${url} expected HTTP ${expected_status}, last result ${status}"
            return 1
          }

          check_url "Main root" "https://${preview_host}/" "302"
          check_url "Main login" "https://${preview_host}/login" "200"
          # Nextcloud first boot runs schema migrations and the integration_openproject
          # app install from before-starting/beforestart.sh; probes are disabled in
          # nc-values.gotmpl, so we poll status.php longer here (~10 min).
          check_url "Nextcloud" "https://nextcloud.${preview_host}/status.php" "200" 60 10
          check_url "Keycloak" "https://keycloak.${preview_host}/realms/opnc" "200"

      - name: Export hosts for Playwright
        if: steps.pullpreview_up.outputs.live == 'true'
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.pullpreview_up.outputs.url }}
          PREVIEW_NAME: ${{ steps.resolve.outputs.preview_name }}
        run: |
          set -euo pipefail
          preview_url="${PREVIEW_URL}"
          preview_host="${preview_url#https://}"
          preview_host="${preview_host#http://}"
          preview_host="${preview_host%%/*}"
          preview_host="${preview_host%%:*}"

          # Normalize https default port to avoid https://host:443 form.
          if [[ "${preview_url}" == *:443 ]]; then
            preview_url="${preview_url%:443}"
          fi

          {
            echo "OPENPROJECT_HOST=${preview_host}"
            echo "NEXTCLOUD_HOST=nextcloud.${preview_host}"
            echo "KEYCLOAK_HOST=keycloak.${preview_host}"
            echo "OPENPROJECT_URL=${preview_url}"
            echo "E2E_ENV=pullpreview"
          } >> "$GITHUB_ENV"

          {
            echo "### PullPreview endpoints"
            echo ""
            echo "- Preview name: \`${PREVIEW_NAME}\`"
            echo "- OpenProject: ${preview_url}"
            echo "- Nextcloud: https://nextcloud.${preview_host}"
            echo "- Keycloak: https://keycloak.${preview_host}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Use Node.js
        if: steps.pullpreview_up.outputs.live == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: e2e/.node-version
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        if: steps.pullpreview_up.outputs.live == 'true'
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        if: steps.pullpreview_up.outputs.live == 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        # continue-on-error is load-bearing: lets teardown + Final status
        # run after a red test step, so we can still report and clean up.
        id: tests
        if: steps.pullpreview_up.outputs.live == 'true'
        continue-on-error: true
        working-directory: e2e
        env:
          SETUP_METHOD: ${{ github.event.inputs.setupMethod }}
          TAG_GREP: ${{ steps.resolve.outputs.grep }}
        shell: bash
        run: |
          set -euo pipefail
          args=(npx playwright test)
          if [ -n "${TAG_GREP:-}" ]; then
            args+=(--grep "${TAG_GREP}")
          fi
          echo "Running: ${args[*]}"
          echo "Hosts: OP=${OPENPROJECT_HOST} NC=${NEXTCLOUD_HOST} KC=${KEYCLOAK_HOST}"
          "${args[@]}"

      - name: Add detected versions to summary
        if: always() && steps.pullpreview_up.outputs.live == 'true'
        working-directory: e2e
        shell: bash
        run: |
          set -euo pipefail

          json="test-results/e2e-env.json"
          if [[ ! -f "${json}" ]]; then
            echo "::warning::Version file not found at ${json}; skipping versions summary."
            exit 0
          fi

          get() {
            jq -r --arg k "$1" '.[$k] // "not-detected"' "${json}"
          }

          op="$(get OPENPROJECT_VERSION)"
          nc="$(get NEXTCLOUD_VERSION)"
          nc_api="$(get NEXTCLOUD_API_VERSION)"
          integration_app="$(get INTEGRATION_APP_VERSION)"
          team_folders="$(get NEXTCLOUD_TEAM_FOLDERS_VERSION)"
          keycloak="$(get KEYCLOAK_VERSION)"

          {
            echo "### Versions"
            echo ""
            printf '%s\n' "- OpenProject: \`${op}\`"
            printf '%s\n' "- Nextcloud: \`${nc}\`"
            printf '%s\n' "- Nextcloud API: \`${nc_api}\`"
            printf '%s\n' "- Integration app (integration_openproject): \`${integration_app}\`"
            printf '%s\n' "- Team Folders: \`${team_folders}\`"
            printf '%s\n' "- Keycloak: \`${keycloak}\`"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Trigger PullPreview teardown
        # Keep environment only when tests did not succeed AND the checkbox is enabled.
        # We still tear down when the preview never became live, to avoid leaking resources.
        if: always() && github.event.inputs.action == 'up' && (steps.pullpreview_up.outputs.live != 'true' || steps.tests.outcome == 'success' || (steps.tests.outcome != 'success' && github.event.inputs.keep_environment_on_failure != 'true'))
        uses: pullpreview/action@65df5209b58f360444525f1167f9e14803521fed
        with:
          provider: hetzner
          label: ${{ steps.resolve.outputs.preview_name }}
          force_action: down
          deployment_target: helm
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_CA_KEY: ${{ secrets.HETZNER_CA_KEY }}

      - name: Keep environment notice
        if: always() && github.event.inputs.action == 'up' && steps.tests.outcome != 'success' && github.event.inputs.keep_environment_on_failure == 'true' && steps.pullpreview_up.outputs.live == 'true'
        shell: bash
        env:
          PREVIEW_NAME: ${{ steps.resolve.outputs.preview_name }}
        run: |
          {
            echo "### PullPreview environment kept for debugging"
            echo ""
            echo "- Preview name: \`${PREVIEW_NAME}\`"
            echo ""
            echo "To tear down later:"
            echo "- Run workflow: **PullPreview Teardown**"
            echo "- Input: \`preview_name=${PREVIEW_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always() && github.event.inputs.action == 'up' && steps.pullpreview_up.outputs.live == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Final status
        if: always() && github.event.inputs.action == 'up'
        shell: bash
        env:
          PREVIEW_LIVE: ${{ steps.pullpreview_up.outputs.live }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          if [ "${PREVIEW_LIVE}" != "true" ]; then
            echo "::error::PullPreview did not become live; tests were not run."
            exit 1
          fi
          case "${TESTS_OUTCOME}" in
            success) exit 0 ;;
            failure)
              echo "::error::Playwright tests failed."
              exit 1
              ;;
            skipped)
              echo "::error::Playwright tests did not run (earlier step failed or was skipped)."
              exit 1
              ;;
            *)
              echo "::error::Unexpected Playwright step outcome: ${TESTS_OUTCOME}"
              exit 1
              ;;
          esac

      - name: Final status (teardown)
        if: always() && github.event.inputs.action == 'down'
        shell: bash
        env:
          PREVIEW_NAME: ${{ steps.resolve.outputs.preview_name }}
        run: |
          echo "PullPreview teardown completed for label: ${PREVIEW_NAME}"
          exit 0

