# Integration setup method
# Options: 'oauth2', 'sso-nextcloud', 'sso-external'
integrationSetupMethod: 'sso-external'

previewMode: false

# When defer is true, setup-job is not created by the bootstrap release; install it via a
# follow-up release with renderScope: setupJob (PullPreview phased deploy).
renderScope: bootstrap
setupJob:
  enabled: true
  defer: false

openprojectHost: openproject.test
openprojectAssetHost: openproject-assets.test
nextcloudHost: nextcloud.test
keycloakHost: keycloak.test
xwikiHost: xwiki.test

oidcProvider:
  name: keycloak
  openprojectClientId: openproject
  openprojectClientSecret: openproject-secret

nextcloud:
  enableApps:
    # Add the folloing entry for each app you want to enable
    #   - name: 'app_name'   # Name of the app
    #     version: ''        # [Optional] Release version of the app
    #     gitBranch: ''      # [Optional] Git branch to use as the source
    # NOTE: 'version' will be ignored if 'gitBranch' is set
    - name: 'integration_openproject'
      version: ''
      gitBranch: ''
    - name: 'oidc'
      version: ''
      gitBranch: ''
    - name: 'user_oidc'
      version: ''
      gitBranch: ''
    - name: 'groupfolders'
      version: ''
      gitBranch: ''

openproject:
  # OpenProject container image tag
  dockerTag: ''
  # Git branch to use as the source
  # Example: dev
  gitSourceBranch: ''
  # Local host path to OpenProject source code
  localSourcePath: ''
  customSourceMountPath: /home/app/openproject
  sourcePvcStorage: 12Gi
  standalone: false
  enableTestSetup: false
  railsEnv: 'production'
  xwiki:
    clientId: xwiki-client-id
    clientSecret: xwiki-client-secret
# OpenProject environment variables
environment: {}

extraVolumes: []
extraVolumeMounts: []
extraEnv: []

ingress:
  # Ingress class name
  ingressClassName: 'traefik'
  # TLS secret name
  tlsSecretName: 'opnc-tls-secret'
  # Use exisiting TLS secret name. If set, the above tlsSecretName will be ignored.
  existingTlsSecretName: ''

persistence:
  storageClassName: ''
  accessModes:
    - 'ReadWriteOnce'

xwiki:
  enabled: false
