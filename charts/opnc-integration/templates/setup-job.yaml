{{- if include "opnc.renderSetupJob" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: setup-job
spec:
  template:
    spec:
      restartPolicy: Never
      {{- $ingressIp := .Values.ingress.hostAliasIp }}
      {{- if and (not $ingressIp) (not .Values.previewMode) }}
      {{- $traefik := lookup "v1" "Service" "kube-system" "traefik" }}
      {{- if and $traefik $traefik.status.loadBalancer.ingress }}
      {{- $ingressIp = (index $traefik.status.loadBalancer.ingress 0).ip }}
      {{- end }}
      {{- end }}
      {{- if and (not .Values.previewMode) $ingressIp }}
      hostAliases:
        - ip: {{ $ingressIp | quote }}
          hostnames:
            - {{ include "opnc.openprojectHost" . }}
            - {{ include "opnc.openprojectAssetHost" . }}
            - {{ include "opnc.nextcloudHost" . }}
            - {{ include "opnc.keycloakHost" . }}
            {{- if .Values.xwiki.enabled }}
            - {{ include "opnc.xwikiHost" . }}
            {{- end }}
      {{- end }}
      containers:
        - name: setup-integration
          image: ddev/ddev-utilities
          command: ['/scripts/setup-integration.sh']
          env:
            - name: NEXTCLOUD_HOST
              value: '{{ include "opnc.nextcloudHost" . }}'
            - name: OPENPROJECT_HOST
              value: '{{ include "opnc.openprojectHost" . }}'
            - name: KEYCLOAK_HOST
              value: '{{ include "opnc.keycloakHost" . }}'
            - name: INTEGRATION_APP_SETUP_METHOD
              value: '{{ .Values.integrationSetupMethod }}'
            - name: OIDC_KEYCLOAK_PROVIDER_NAME
              value: '{{ include "opnc.oidc.providerName" . }}'
            - name: OIDC_OPENPROJECT_CLIENT_ID
              value: '{{ include "opnc.oidc.openprojectClientId" . }}'
            - name: OIDC_OPENPROJECT_CLIENT_SECRET
              value: '{{ include "opnc.oidc.openprojectClientSecret" . }}'
            # In-cluster health checks: *.test hostnames resolve on the host (k3d /etc/hosts) but not from pods.
            - name: NEXTCLOUD_WAIT_URL
              value: 'http://nextcloud/status.php'
            - name: NEXTCLOUD_WAIT_HOST_HEADER
              value: '{{ include "opnc.nextcloudHost" . }}'
            - name: OPENPROJECT_WAIT_URL
              value: 'http://openproject:8080/health_checks/default'
            - name: KEYCLOAK_WAIT_URL
              value: 'http://keycloak:8080/realms/opnc'
            {{- include "opnc.extraEnv" . | indent 12 }}
          volumeMounts:
            - name: setup-script
              mountPath: /scripts/setup-integration.sh
              subPath: setup-integration.sh
            {{- include "opnc.volumes.extraVolumeMounts" . | indent 12 }}

      volumes:
        - name: setup-script
          configMap:
            name: opnc-setup-configmap
            defaultMode: 0755
        {{- include "opnc.volumes.extraVolumes" . | indent 8 }}
{{- end }}
