{{- if include "opnc.renderSetupJob" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: setup-job
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: Never
      {{- if .Values.xwiki.enabled }}
      initContainers:
        - name: xwiki-oauth-setup
          image: "docker.io/openproject/openproject:{{ .Values.openproject.dockerTag | default "17" }}"
          imagePullPolicy: IfNotPresent
          command:
            - bundle
            - exec
            - rails
            - runner
            - /scripts/setup-xwiki-oauth.rb
          env:
            - name: XWIKI_OAUTH_CLIENT_ID
              value: {{ index .Values.openproject.xwiki "clientId" | default "xwiki-client-id" | quote }}
            - name: XWIKI_OAUTH_CLIENT_SECRET
              value: {{ index .Values.openproject.xwiki "clientSecret" | default "xwiki-client-secret" | quote }}
            - name: XWIKI_HOST
              value: {{ include "opnc.xwikiHost" . | quote }}
            - name: RAILS_ENV
              value: {{ .Values.environment.RAILS_ENV | default "production" | quote }}
            - name: DATABASE_URL
              value: {{ required "environment.DATABASE_URL is required for XWiki OAuth setup" .Values.environment.DATABASE_URL | quote }}
            - name: DATABASE_HOST
              value: {{ .Values.environment.DATABASE_HOST | quote }}
            - name: OPENPROJECT_DISABLE__SECRET_KEY_BASE__CHECK
              value: "true"
          volumeMounts:
            - name: setup-script
              mountPath: /scripts/setup-xwiki-oauth.rb
              subPath: setup-xwiki-oauth.rb
      {{- end }}
      containers:
        - name: setup-integration
          image: ddev/ddev-utilities
          command: ['/scripts/setup-integration.sh']
          env:
            - name: NEXTCLOUD_HOST
              value: '{{ include "opnc.nextcloudHost" . }}'
            - name: OPENPROJECT_HOST
              value: '{{ include "opnc.openprojectHost" . }}'
            - name: KEYCLOAK_HOST
              value: '{{ include "opnc.keycloakHost" . }}'
            - name: INTEGRATION_APP_SETUP_METHOD
              value: '{{ .Values.integrationSetupMethod }}'
            - name: OIDC_KEYCLOAK_PROVIDER_NAME
              value: '{{ include "opnc.oidc.providerName" . }}'
            - name: OIDC_OPENPROJECT_CLIENT_ID
              value: '{{ include "opnc.oidc.openprojectClientId" . }}'
            - name: OIDC_OPENPROJECT_CLIENT_SECRET
              value: '{{ include "opnc.oidc.openprojectClientSecret" . }}'
            {{- if .Values.previewMode }}
            - name: NEXTCLOUD_WAIT_URL
              value: 'http://nextcloud/status.php'
            - name: NEXTCLOUD_WAIT_HOST_HEADER
              value: '{{ include "opnc.nextcloudHost" . }}'
            - name: OPENPROJECT_WAIT_URL
              value: 'http://openproject:8080/health_checks/default'
            - name: KEYCLOAK_WAIT_URL
              value: 'http://keycloak:8080/realms/opnc'
            {{- end }}
            {{- include "opnc.extraEnv" . | indent 12 }}
          volumeMounts:
            - name: setup-script
              mountPath: /scripts/setup-integration.sh
              subPath: setup-integration.sh
            {{- include "opnc.volumes.extraVolumeMounts" . | indent 12 }}

      volumes:
        - name: setup-script
          configMap:
            name: opnc-setup-configmap
            defaultMode: 0755
        {{- include "opnc.volumes.extraVolumes" . | indent 8 }}
{{- end }}
