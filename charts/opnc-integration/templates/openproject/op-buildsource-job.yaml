{{ if or .Values.openproject.gitSourceBranch .Values.openproject.localSourcePath }}
apiVersion: batch/v1
kind: Job
metadata:
  name: op-buildsource-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: build-source
          image: ruby:{{ .Values.openproject.rubyVersion | default "latest" }}
          workingDir: {{ .Values.openproject.customSourceMountPath | quote }}
          command: ['/scripts/setup-op-source.sh']
          {{- if .Values.environment }}
          envFrom:
            - secretRef:
                name: op-environment
          {{- end }}
          env:
            - name: OP_GIT_SOURCE_BRANCH
              value: '{{ .Values.openproject.gitSourceBranch }}'
            {{ if .Values.openproject.localSourcePath }}
            - name: OP_USE_LOCAL_SOURCE
              value: 'true'
            {{ end }}
          volumeMounts:
            - name: build-source-script
              mountPath: /scripts/setup-op-source.sh
              subPath: setup-op-source.sh
            - name: op-source-data
              mountPath: {{ .Values.openproject.customSourceMountPath | quote }}
            - name: database-config
              mountPath: /scripts/database.yaml
              subPath: database.yaml
      volumes:
        - name: build-source-script
          configMap:
            name: op-setupsource-configmap
            defaultMode: 0755
        {{ if and .Values.openproject.gitSourceBranch (not .Values.openproject.localSourcePath) }}
        - name: op-source-data
          persistentVolumeClaim:
            claimName: op-source-pvc
        {{ end }}
        {{ if .Values.openproject.localSourcePath }}
        - name: op-source-data
          hostPath:
            path: {{ .Values.openproject.localSourcePath }}
            type: Directory
        - name: database-config
          configMap:
            name: op-database-configmap
            defaultMode: 0755
        {{ end }}

{{ if and .Values.openproject.gitSourceBranch (not .Values.openproject.localSourcePath) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: op-source-pvc
spec:
  accessModes: {{ .Values.persistence.accessModes | default (list "ReadWriteOnce") }}
  resources:
    requests:
      storage: 5Gi
{{ end }}
{{ end }}